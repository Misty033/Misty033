name: Mist Bot
on:
  issues:
    types: [opened]

jobs:
  reply:
    runs-on: ubuntu-latest
    steps:
      - name: Mist Bot Reply
        uses: actions/github-script@v6
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const question = context.payload.issue.body;
            const title = context.payload.issue.title;

            const res = await fetch(
              `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${process.env.GEMINI_API_KEY}`,
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  contents: [{
                    parts: [{
                      text: `You are Mist Bot, the AI assistant of Misty Roy — an AI/ML Engineer skilled in RAG, LLMs, MLOps, LangChain, and production AI systems. Answer the following question in a friendly, helpful, and concise way as if you are representing Misty personally.\n\nQuestion: ${question}`
                    }]
                  }]
                })
              }
            );

            const data = await res.json();
            const reply = data.candidates[0].content.parts[0].text;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `### 🌫️ Mist Bot says:\n\n${reply}\n\n---\n*I'm Misty's AI assistant. For direct queries, reach her at roy.misty.1204@gmail.com*`
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: "closed",
              labels: ["answered by mist-bot"]
            });
